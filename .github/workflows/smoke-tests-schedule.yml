name: smoke-tests
run-name: Smoke Tests

on:
  workflow_dispatch: ~
  schedule:
    - cron: '0 3 * * 1-5'

# Limit the access of the generated GITHUB_TOKEN
permissions:
  contents: read

jobs:
  smoke-tests-os:
    name: Run smoke tests OS
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/smoke-tests-os.yml
    with:
      branch: 'test/smoke-tests-oidc-1'
    secrets: inherit

  smoke-tests-ess:
    name: Run smoke tests ESS
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/smoke-tests-ess.yml
    with:
      branch: 'test/smoke-tests-oidc-1'
    secrets: inherit

