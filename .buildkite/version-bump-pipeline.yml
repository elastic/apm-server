notify:
  - slack:
      channels:
        - "#apm-server"
    if: (build.branch == 'main' || build.branch =~ /^[0-9]+\.[0-9x]+\$/) && (build.state == 'passed' || build.state == 'failed')
  - slack:
      channels:
        - "#apm-server"
      message: |
        🚦 Pipeline waiting for approval 🚦
        Repo: `${REPO}`

        Ready to fetch DRA artifacts - please unblock when ready.
        New version: `${NEW_VERSION}`
        Branch: `${BRANCH}`
        Workflow: `${WORKFLOW}`
        ${BUILDKITE_BUILD_URL}
    if: build.state == "blocked"

steps:
  - label: "Validate WORKFLOW and NEW_VERSION consistency"
    command: |
      if [ "$${WORKFLOW}" = "minor" ]; then
        if ! echo "$${NEW_VERSION}" | grep -q '0$$'; then
          echo "❌ Error: WORKFLOW is 'minor' but NEW_VERSION ($${NEW_VERSION}) does not end with 0"
          exit 1
        fi
        echo "✅ Valid: WORKFLOW is 'minor' and NEW_VERSION ($${NEW_VERSION}) ends with 0"
      elif [ "$${WORKFLOW}" = "patch" ]; then
        if echo "$${NEW_VERSION}" | grep -q '0$$'; then
          echo "❌ Error: WORKFLOW is 'patch' but NEW_VERSION ($${NEW_VERSION}) ends with 0"
          exit 1
        fi
        echo "✅ Valid: WORKFLOW is 'patch' and NEW_VERSION ($${NEW_VERSION}) does not end with 0"
      else
        echo "❌ Error: WORKFLOW must be either 'minor' or 'patch', got '$${WORKFLOW}'"
        exit 1
      fi

  - wait:

  - label: "Bump version minor"
    if: build.env("WORKFLOW") == "minor"
    plugins:
      - elastic/vault-github-token#v0.1.0:
      - elastic/gh-cli#v0.1.0:
          version: "2.62.0"
          wait: true
          workflow-file: "run-minor-release.yml"
          workflow-ref: "main"
          workflow-inputs:
            version: "${NEW_VERSION}"

  - label: "Bump version patch"
    if: build.env("WORKFLOW") == "patch"
    plugins:
      - elastic/vault-github-token#v0.1.0:
      - elastic/gh-cli#v0.1.0:
          version: "2.62.0"
          wait: true
          workflow-file: "run-patch-release.yml"
          workflow-ref: "main"
          workflow-inputs:
            version: "${NEW_VERSION}"

  - block: "Ready to fetch for DRA artifacts?"
    prompt: |
      Unblock when your team is ready to proceed.

      Trigger parameters:
      - NEW_VERSION: ${NEW_VERSION}
      - BRANCH: ${BRANCH}
      - WORKFLOW: ${WORKFLOW}
    key: block-get-dra-artifacts
    blocked_state: running

  - label: "Fetch DRA Artifacts"
    key: fetch-dra-artifacts
    depends_on: block-get-dra-artifacts
    agents:
      image: docker.elastic.co/release-eng/wolfi-build-essential-release-eng:latest
      cpu: 250m
      memory: 512Mi
      ephemeralStorage: 1Gi
    command:
      - echo "Starting DRA artifacts retrieval..."
    timeout_in_minutes: 240
    retry:
      automatic:
        - exit_status: "*"
          limit: 2
      manual:
        permit_on_passed: true

    plugins:
      - elastic/json-watcher#v1.0.0:
          url: "https://artifacts-staging.elastic.co/apm-server/latest/${BRANCH}.json"
          field: ".version"
          expected_value: "${NEW_VERSION}"
          polling_interval: "30"
      - elastic/json-watcher#v1.0.0:
          url: "https://storage.googleapis.com/elastic-artifacts-snapshot/apm-server/latest/${BRANCH}.json"
          field: ".version"
          expected_value: "${NEW_VERSION}-SNAPSHOT"
          polling_interval: "30"
