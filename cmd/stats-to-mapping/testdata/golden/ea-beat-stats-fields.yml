      type: long
      description: >
        Beat uptime
    - name: runtime.goroutines
      type: long
      description: >
        Number of goroutines running in Beat
    - name: libbeat
      type: group
      description: >
        Fields common to all Beats
      fields:
        - name: pipeline
          type: group
          fields:
            - name: clients
              type: long
            - name: queue
              type: group
              fields:
                - name: acked
                  type: long
                  metric_type: counter
                  description: >
                    Number of acknowledged events
                - name: added.bytes
                  type: long
                  metric_type: counter
                  description: >
                    Number of bytes added to the queue
                - name: added.events
                  type: long
                  metric_type: counter
                  description: >
                    Number of events added to the queue
                - name: consumed.bytes
                  type: long
                  metric_type: counter
                  description: >
                    Number of bytes consumed from the queue
                - name: consumed.events
                  type: long
                  metric_type: counter
                  description: >
                    Number of events consumed from the queue
                - name: filled.bytes
                  type: long
                  metric_type: gauge
                  description: >
                    Number of bytes filled in the queue
                - name: filled.events
                  type: long
                  metric_type: gauge
                  description: >
                    Number of events filled in the queue
                - name: filled.pct
                  type: float
                  metric_type: gauge
                  description: >
                    Percentage of the queue filled
                - name: max_events
                  type: long
                  metric_type: gauge
                  description: >
                    Maximum number of events allowed in the queue
                - name: removed.bytes
                  type: long
                  metric_type: counter
                  description: >
                    Number of bytes removed from the queue
                - name: removed.events
                  type: long
                  metric_type: counter
                  description: >
                    Number of events removed from the queue
            - name: events
              type: group
              fields:
                - name: active
                  type: long
                  metric_type: counter
                - name: dropped
                  type: long
                  metric_type: counter
                - name: failed
                  type: long
                  metric_type: counter
                - name: filtered
                  type: long
                  metric_type: counter
                - name: published
                  type: long
                  metric_type: counter
                - name: retry
                  type: long
                  metric_type: counter
                - name: total
                  type: long
                  metric_type: counter
        - name: config
          type: group
          fields:
            - name: reloads
              type: long
            - name: running
              type: long
            - name: starts
              type: long
            - name: stops
              type: long
        - name: output
          type: group
          fields:
            - name: type
              type: keyword
              description: >
                Type of output
            - name: events
              type: group
              fields:
                - name: acked
                  type: long
                  metric_type: counter
                  description: >
                    Number of events acknowledged
                - name: active
                  type: long
                  metric_type: counter
                  description: >
                    Number of active events
                - name: batches
                  type: long
                  metric_type: counter
                  description: >
                    Number of event batches
                - name: dropped
                  type: long
                  metric_type: counter
                  description: >
                    Number of events dropped
                - name: duplicates
                  type: long
                  metric_type: counter
                  description: >
                    Number of events duplicated
                - name: failed
                  type: long
                  metric_type: counter
                  description: >
                    Number of events failed
                - name: toomany
                  type: long
                  metric_type: counter
                  description: >
                    Number of too many events
                - name: total
                  type: long
                  metric_type: counter
                  description: >
                    Total number of events processed by the output
            - name: write
              type: group
              description: >
                Write stats
              fields:
                - name: bytes
                  type: long
                  metric_type: counter
                  description: >
                    Number of bytes written
                - name: errors
                  type: long
                  metric_type: counter
                  description: >
                    Number of write errors
                - name: latency
                  type: group
                  fields:
                    - name: histogram
                      type: group
                      fields:
                        - name: count
                          type: long
                        - name: max
                          type: float
                        - name: median
                          type: long
                        - name: p99
                          type: float
            - name: read
              type: group
              description: >
                Read stats
              fields:
                - name: bytes
                  type: long
                  metric_type: counter
                  description: >
                    Number of bytes read
                - name: errors
                  type: long
                  metric_type: counter
                  description: >
                    Number of read errors
