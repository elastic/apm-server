- name: beat.stats
  type: group
  fields:
    - name: beat
      type: group
      fields:
        - name: name
          type: keyword
        - name: host
          type: keyword
        - name: type
          type: keyword
        - name: uuid
          type: keyword
        - name: version
          type: keyword
    - name: system
      type: group
      fields:
        - name: cpu.cores
          type: long
        - name: load
          type: group
          fields:
            - name: "1"
              type: double
            - name: "15"
              type: double
            - name: "5"
              type: double
            - name: norm
              type: group
              fields:
                - name: "1"
                  type: double
                - name: "15"
                  type: double
                - name: "5"
                  type: double
